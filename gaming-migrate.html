function log(msg,type='info'){const d=document.getElementById('log');d.style.display='block';d.innerHTML+=`<div class="${type}">${msg}</div>`;d.scrollTop=d.scrollHeight;}

async function migrate(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Migrating…';
  log(`Starting migration of ${DATA.length} games…`,'info');
  let ok=0,fail=0;
  for(const item of DATA){
    const row={id:item.id,title:item.title||'',platform:item.platform||'ps',genre:item.genre||'Other',status:item.status||'Backlog',stars:item.stars||0,release_year:item.releaseYear||'',notes:'',art_url:'',year_completed:'',added:new Date().toISOString()};
    try{
      const res=await fetch(`${SB_URL}/rest/v1/games`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(row)});
      if(res.ok||res.status===201){log(`✓ ${item.title}`,'ok');ok++;}
      else{const e=await res.text();log(`✗ ${item.title} — ${e}`,'err');fail++;}
    }catch(e){log(`✗ ${item.title} — ${e.message}`,'err');fail++;}
    await new Promise(r=>setTimeout(r,80));
  }
  log('','info');
  log(`🎮 Done! ${ok} succeeded, ${fail} failed.`,'done');
  btn.textContent='Done!';
}
